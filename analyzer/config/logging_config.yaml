# analyzer/config/logging_config.yaml

version: 1
disable_existing_loggers: false

formatters:
  console:
    format: '%(message)s'
    datefmt: '%H:%M:%S'

  detailed:
    format: '%(asctime)s | %(levelname)-8s | %(name)-20s | %(funcName)s:%(lineno)d | %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

filters:
  console_filter:
    (): analyzer.utils.logging_filters.ConsoleFilter

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: console
    stream: ext://sys.stdout
    filters: [console_filter]

  file_detailed:
    class: logging.handlers.TimedRotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/bot/signal_generator.log
    when: midnight
    interval: 1
    backupCount: 30
    encoding: utf-8

  file_errors:
    class: logging.handlers.TimedRotatingFileHandler
    level: WARNING
    formatter: detailed
    filename: logs/errors.log
    when: midnight
    interval: 1
    backupCount: 30
    encoding: utf-8

loggers:
  api_client_bybit:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  data_provider:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  liquidity_prefilter:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  screen1_analyzer:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  screen2_analyzer:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  screen3_analyzer:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  fvg_detector:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  liquidity_scanner:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  orchestrator:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  position_manager:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  signal_repository:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

  three_screen_analyzer:
    level: DEBUG
    handlers: [console, file_detailed, file_errors]
    propagate: false

root:
  level: DEBUG
  handlers: [console, file_detailed, file_errors]